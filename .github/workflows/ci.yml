name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
      - name: Run Node tests
        run: npm test
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9
      - name: Run Bun transport smoke test
        run: npm run test:bun
      - name: Run installer tests
        run: npm run test:installer
      - name: Install documentation dependencies
        run: npm ci --prefix docs
      - name: Build documentation
        run: npm run build --prefix docs
      - name: Run provider-free OpenCode compatibility smoke
        shell: bash
        run: |
          set -euo pipefail
          npm install --prefix "$RUNNER_TEMP/opencode-linux-x64-1.18.4" --no-save --package-lock=false --ignore-scripts --omit=dev --no-audit --no-fund opencode-linux-x64@1.18.4
          package_root="$(realpath "$RUNNER_TEMP/opencode-linux-x64-1.18.4")"
          package_json="$package_root/node_modules/opencode-linux-x64/package.json"
          test "$(node -p 'require(process.argv[1]).version' "$package_json")" = "1.18.4"
          opencode_path="$(realpath "$package_root/node_modules/opencode-linux-x64/bin/opencode")"
          case "$opencode_path" in
            "$package_root"/*) ;;
            *) exit 1 ;;
          esac
          test -f "$opencode_path"
          test -x "$opencode_path"
          bun_path="$(realpath "$(command -v bun)")"
          test -f "$bun_path"
          test -x "$bun_path"
          node scripts/naru-compat-smoke.mjs --opencode "$opencode_path" --source "$GITHUB_WORKSPACE" --dashboard --bun "$bun_path" --json
      - name: Check whitespace
        run: git diff --check
